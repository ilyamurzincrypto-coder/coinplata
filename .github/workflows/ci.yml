# CI — автоматизирует «ворота» из CLAUDE.md: npm test (зелёный) + npm run build.
# Гоняется на push в main и на каждый PR. Не заменяет деплой (Vercel), только гейт.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm install (не ci): package-lock тянет опциональный @esbuild/netbsd-arm64,
      # на котором `npm ci` строго падает EBADPLATFORM. install пропускает
      # несовместимые платформенные optional-депы. (Тот же esbuild-затык, из-за
      # которого репо ушёл с pnpm — см. CLAUDE.md.)
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm test
      - run: npm run build
